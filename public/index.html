<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderBot Pro - Order Management Made Easy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 1s ease infinite;
      animation-delay: 0.2s;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 48px;
      color: white;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 40px;
      font-weight: 300;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .feature {
      color: white;
    }

    .feature-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .feature-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 14px;
      opacity: 0.9;
    }

    .cta-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    button {
      padding: 16px 40px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: white;
      color: #667eea;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid white;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
    }

    .footer {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-top: 60px;
    }

    .footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 18px;
      }

      .logo {
        font-size: 60px;
      }

      .features {
        grid-template-columns: 1fr;
      }

      .cta-buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📦</div>

    <h1>OrderBot Pro</h1>
    <p class="subtitle">Effortless Order Management for Your Business</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔐</div>
        <div class="feature-title">Secure</div>
        <div class="feature-desc">End-to-end encrypted authentication</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-title">Fast</div>
        <div class="feature-desc">Lightning-quick order processing</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-title">Smart</div>
        <div class="feature-desc">Real-time order tracking</div>
      </div>
    </div>

    <div class="cta-buttons">
      <button class="btn-primary" onclick="goToPage('/auth.html')">
        Get Started
      </button>
      <button class="btn-secondary" onclick="goToPage('/auth.html')">
        Sign In
      </button>
    </div>

    <div class="footer">
      <p>Ready to transform your order management? <a href="/auth.html">Start now</a></p>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    console.log('[HOME PAGE] Initialized');

    // Check if user is already logged in
    if (isLoggedIn()) {
      // Redirect to orders page if already logged in
      window.location.href = '/order.html';
    }
  </script>
</body>
</html>
