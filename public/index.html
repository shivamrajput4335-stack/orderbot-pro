<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OrderBot Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

.left, .right {
  padding: 30px;
}

.left {
  width: 35%;
}

.right {
  width: 65%;
  overflow-y: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 20px;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  font-weight: bold;
  cursor: pointer;
}

.order {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete {
  background: #ef4444;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="card">
      <h2>⚡ OrderBot Pro</h2>

      <input id="name" placeholder="Name" />
      <input id="product" placeholder="Product" />
      <input id="quantity" type="number" placeholder="Quantity" />

      <button onclick="submitOrder()">Submit Order</button>

      <p id="status"></p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <h2>📦 Orders</h2>
    <div id="orders"></div>
  </div>

</div>

<script>
const API = "http://localhost:3000"; // change after deploy

async function loadOrders() {
  const res = await fetch(API + "/orders");
  const data = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  data.forEach(order => {
    const div = document.createElement("div");
    div.className = "order";

    div.innerHTML = `
      <div>
        <b>${order.name}</b><br>
        ${order.product} (${order.quantity})
      </div>
      <div class="delete" onclick="deleteOrder(${order.id})">Delete</div>
    `;

    container.appendChild(div);
  });
}

async function submitOrder() {
  const name = document.getElementById("name").value;
  const product = document.getElementById("product").value;
  const quantity = document.getElementById("quantity").value;
  const status = document.getElementById("status");

  if (!name || !product || quantity <= 0) {
    status.innerText = "❌ Invalid input";
    return;
  }

  status.innerText = "⏳ Saving...";

  await fetch(API + "/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, product, quantity })
  });

  status.innerText = "✅ Saved";

  loadOrders();
}

async function deleteOrder(id) {
  await fetch(API + "/order/" + id, { method: "DELETE" });
  loadOrders();
}

loadOrders();
</script>

</body>
</html>
