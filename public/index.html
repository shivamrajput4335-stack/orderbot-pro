<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OrderBot Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Segoe UI", sans-serif;
  color: white;
}

.container {
  display: flex;
  gap: 30px;
}

.left .card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

#status {
  margin-top: 10px;
  min-height: 1.2em;
}

.right {
  width: 300px;
}

.order {
  background: rgba(255, 255, 255, 0.05);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.form-actions {
  display: flex;
  gap: 10px;
}

.form-actions button {
  width: 100%;
}

.secondary-button {
  background: rgba(255, 255, 255, 0.14);
  color: white;
}

.order-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.order-action {
  padding: 8px 10px;
  font-size: 14px;
}

.edit-action {
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
  color: #111827;
}
</style>
</head>

<body>

<div class="container">
  <div class="left">
    <form class="card" id="order-form" novalidate>
      <h2>OrderBot</h2>

      <input id="name" placeholder="Your Name" required />
      <input id="product" placeholder="Product Name" required />
      <input id="quantity" type="number" min="1" placeholder="Quantity" required />

      <div class="form-actions">
        <button id="submit-order" type="submit">Submit</button>
        <button id="cancel-edit" type="button" class="secondary-button" hidden>Cancel</button>
      </div>

      <p id="status"></p>
    </form>
  </div>

  <div class="right">
    <h2>Orders</h2>
    <div id="orders"></div>
  </div>
</div>

<script src="/app.js?v=20260413"></script>

</body>
</html>
