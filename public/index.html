<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderBot Pro</title>

  <!-- SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #0a0f2c, #020617);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card h3 {
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #22c55e;
      background: rgba(255, 255, 255, 0.15);
    }

    button {
      width: 100%;
      padding: 10px 16px;
      margin-top: 8px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    button:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    button:disabled {
      background: #808080;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #86efac;
      display: block;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #fca5a5;
      display: block;
    }

    .order-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 3px solid #22c55e;
    }

    .order-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .order-item small {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-status {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 12px;
      text-align: center;
    }

    .auth-status.logged-in {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #86efac;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- AUTH CARD -->
  <div class="card">
    <h3>🔐 Authentication</h3>
    <div id="authStatus" class="auth-status">Not logged in</div>
    
    <div class="form-group">
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
    </div>

    <button id="signupBtn" onclick="handleSignup()">Create Account</button>
    <button id="loginBtn" onclick="handleLogin()">Login</button>
    <button id="logoutBtn" onclick="handleLogout()" style="display: none; background: #ef4444;">Logout</button>
  </div>

  <!-- ORDER CARD -->
  <div class="card">
    <h3>📝 Create Order</h3>
    <div id="orderStatus" class="status"></div>

    <form id="orderForm" onsubmit="handleSubmitOrder(event)">
      <input id="name" type="text" placeholder="Customer Name" required />
      <input id="product" type="text" placeholder="Product" required />
      <input id="quantity" type="number" placeholder="Quantity" min="1" required />
      <button type="submit" id="submitBtn">Submit Order</button>
    </form>
  </div>

  <!-- ORDERS LIST CARD -->
  <div class="card">
    <h3>📦 Your Orders</h3>
    <div id="orderStatus2" class="status"></div>
    <div id="orders">
      <p style="color: rgba(255,255,255,0.5); font-size: 13px;">Log in to see your orders</p>
    </div>
  </div>

</div>

<script>
  // ⚙️ CONFIGURATION
  const API_URL = window.location.hostname === 'localhost' 
    ? 'http://localhost:3000'
    : 'https://orderbot-pro.onrender.com';

  const SUPABASE_URL = 'https://xaajavxegbcahusslypx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhYWphdnhlZ2JjYWh1c3NseXB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzM2NzMsImV4cCI6MjA5MTUwOTY3M30.zmuiRqI2juksLci9BGgG-p1MIrI9BGBDLY6J6pasUps';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 🎯 DOM ELEMENTS
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const authStatus = document.getElementById('authStatus');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const orderForm = document.getElementById('orderForm');
  const nameInput = document.getElementById('name');
  const productInput = document.getElementById('product');
  const quantityInput = document.getElementById('quantity');
  const submitBtn = document.getElementById('submitBtn');
  const ordersDiv = document.getElementById('orders');
  const orderStatus = document.getElementById('orderStatus');
  const orderStatus2 = document.getElementById('orderStatus2');

  let currentUser = null;

  // ✅ UTILITY: Show status message
  function showStatus(element, message, type) {
    element.textContent = message;
    element.className = `status ${type}`;
    setTimeout(() => {
      if (type === 'error') {
        element.className = 'status';
      }
    }, 5000);
  }

  // 🔐 AUTHENTICATION: Signup
  async function handleSignup() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      showStatus(orderStatus, '❌ Email and password required', 'error');
      return;
    }

    signupBtn.disabled = true;
    signupBtn.textContent = '⏳ Creating account...';

    try {
      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        showStatus(orderStatus, `❌ ${error.message}`, 'error');
      } else {
        showStatus(orderStatus, '✅ Account created! Check your email to confirm.', 'success');
        emailInput.value = '';
        passwordInput.value = '';
      }
    } catch (err) {
      showStatus(orderStatus, `❌ ${err.message}`, 'error');
    } finally {
      signupBtn.disabled = false;
      signupBtn.textContent = 'Create Account';
    }
  }

  // 🔐 AUTHENTICATION: Login
  async function handleLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      showStatus(orderStatus, '❌ Email and password required', 'error');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = '⏳ Logging in...';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showStatus(orderStatus, `❌ ${error.message}`, 'error');
      } else {
        currentUser = data.user;
        localStorage.setItem('token', data.session.access_token);
        updateAuthUI();
        loadOrders();
        showStatus(orderStatus, '✅ Logged in successfully!', 'success');
      }
    } catch (err) {
      showStatus(orderStatus, `❌ ${err.message}`, 'error');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  }

  // 🔐 AUTHENTICATION: Logout
  async function handleLogout() {
    logoutBtn.disabled = true;
    try {
      await supabase.auth.signOut();
      currentUser = null;
      localStorage.removeItem('token');
      updateAuthUI();
      ordersDiv.innerHTML = '<p style="color: rgba(255,255,255,0.5); font-size: 13px;">Log in to see your orders</p>';
      showStatus(orderStatus, '✅ Logged out', 'success');
    } catch (err) {
      showStatus(orderStatus, `❌ ${err.message}`, 'error');
    } finally {
      logoutBtn.disabled = false;
    }
  }

  // 🎯 UPDATE AUTH UI
  function updateAuthUI() {
    if (currentUser) {
      authStatus.textContent = `✅ Logged in as ${currentUser.email}`;
      authStatus.className = 'auth-status logged-in';
      loginBtn.style.display = 'none';
      signupBtn.style.display = 'none';
      logoutBtn.style.display = 'block';
      orderForm.style.display = 'block';
    } else {
      authStatus.textContent = '❌ Not logged in';
      authStatus.className = 'auth-status';
      loginBtn.style.display = 'block';
      signupBtn.style.display = 'block';
      logoutBtn.style.display = 'none';
      orderForm.style.display = 'none';
    }
  }

  // 📝 ORDERS: Submit Order
  async function handleSubmitOrder(e) {
    e.preventDefault();

    const token = localStorage.getItem('token');
    if (!token) {
      showStatus(orderStatus, '❌ Please login first', 'error');
      return;
    }

    const name = nameInput.value.trim();
    const product = productInput.value.trim();
    const quantity = parseInt(quantityInput.value);

    if (!name || !product || isNaN(quantity) || quantity <= 0) {
      showStatus(orderStatus, '❌ Fill all fields correctly', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ Submitting...';

    try {
      const response = await fetch(`${API_URL}/order`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ name, product, quantity })
      });

      const data = await response.json();

      if (!response.ok) {
        showStatus(orderStatus, `❌ ${data.error || 'Failed to create order'}`, 'error');
      } else {
        showStatus(orderStatus, '✅ Order created successfully!', 'success');
        orderForm.reset();
        loadOrders();
      }
    } catch (err) {
      showStatus(orderStatus, `❌ ${err.message}`, 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Order';
    }
  }

  // 📦 ORDERS: Load Orders
  async function loadOrders() {
    const token = localStorage.getItem('token');
    if (!token) {
      ordersDiv.innerHTML = '<p style="color: rgba(255,255,255,0.5); font-size: 13px;">Log in to see your orders</p>';
      return;
    }

    try {
      const response = await fetch(`${API_URL}/orders`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        throw new Error('Failed to load orders');
      }

      const orders = await response.json();

      if (orders.length === 0) {
        ordersDiv.innerHTML = '<p style="color: rgba(255,255,255,0.5); font-size: 13px;">No orders yet</p>';
      } else {
        ordersDiv.innerHTML = orders.map(order => `
          <div class="order-item">
            <strong>${order.name}</strong>
            <small>Product: ${order.product}</small>
            <small>Qty: ${order.quantity}</small>
            <small>Created: ${new Date(order.created_at).toLocaleDateString()}</small>
            <button onclick="deleteOrder(${order.id})" style="margin-top: 8px; font-size: 12px; background: #ef4444;">Delete</button>
          </div>
        `).join('');
      }
    } catch (err) {
      showStatus(orderStatus2, `❌ ${err.message}`, 'error');
    }
  }

  // ❌ ORDERS: Delete Order
  async function deleteOrder(id) {
    const token = localStorage.getItem('token');
    if (!token) return;

    if (!confirm('Delete this order?')) return;

    try {
      const response = await fetch(`${API_URL}/order/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        throw new Error('Failed to delete order');
      }

      showStatus(orderStatus2, '✅ Order deleted', 'success');
      loadOrders();
    } catch (err) {
      showStatus(orderStatus2, `❌ ${err.message}`, 'error');
    }
  }

  // 🚀 INIT
  document.addEventListener('DOMContentLoaded', async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      currentUser = data.session.user;
      localStorage.setItem('token', data.session.access_token);
    }
    updateAuthUI();
    if (currentUser) {
      loadOrders();
    }
  });
</script>

</body>
</html>
