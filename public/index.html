<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OrderBot Pro</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: #aaa;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #22c55e;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}

.success { color: #4ade80; }
.error { color: #f87171; }
.loading { color: #facc15; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
  <h2>⚡ OrderBot Pro</h2>

  <input id="name" placeholder="Your Name" />
  <input id="product" placeholder="Product Name" />
  <input id="quantity" type="number" placeholder="Quantity" />

  <button onclick="submitOrder()">Submit Order</button>

  <p id="status"></p>
</div>

<script>

// 🔥 CHANGE THIS ONLY IF YOUR URL IS DIFFERENT
const API = "https://orderbot-pro.onrender.com";

async function submitOrder() {
  const name = document.getElementById("name").value;
  const product = document.getElementById("product").value;
  const quantity = document.getElementById("quantity").value;
  const status = document.getElementById("status");

  // validation
  if (!name.trim()) {
    status.className = "error";
    status.innerText = "Enter your name";
    return;
  }

  if (!product.trim()) {
    status.className = "error";
    status.innerText = "Enter product";
    return;
  }

  if (isNaN(quantity) || quantity <= 0) {
    status.className = "error";
    status.innerText = "Quantity must be > 0";
    return;
  }

  status.className = "loading";
  status.innerText = "⏳ Processing...";

  try {
    const res = await fetch(`${API}/order`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        product,
        quantity: Number(quantity)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Failed");
    }

    status.className = "success";
    status.innerText = "✅ Order placed successfully";

    // clear form
    document.getElementById("name").value = "";
    document.getElementById("product").value = "";
    document.getElementById("quantity").value = "";

  } catch (err) {
    status.className = "error";
    status.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
