<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderBot Pro - Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 14px;
      cursor: pointer;
      color: #999;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #f0f0f0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input::placeholder {
      color: #ccc;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #667eea;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .home-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #999;
    }

    .home-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .home-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>OrderBot Pro</h1>
        <p>Manage your orders efficiently</p>
      </div>

      <div id="message" class="message"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="login" class="tab-content active">
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="Enter your email"
              required
            >
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Enter your password"
              required
            >
          </div>
          <div class="button-group">
            <button type="submit" class="btn-primary" id="loginBtn">
              Sign In
            </button>
            <button type="button" class="btn-secondary" onclick="goToPage('/')">
              Back
            </button>
          </div>
        </form>
      </div>

      <!-- Signup Form -->
      <div id="signup" class="tab-content">
        <form id="signupForm">
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="Enter your email"
              required
            >
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input
              type="password"
              id="signupPassword"
              placeholder="Create a password"
              required
            >
          </div>
          <div class="form-group">
            <label for="signupPasswordConfirm">Confirm Password</label>
            <input
              type="password"
              id="signupPasswordConfirm"
              placeholder="Confirm your password"
              required
            >
          </div>
          <div class="button-group">
            <button type="submit" class="btn-primary" id="signupBtn">
              Create Account
            </button>
            <button type="button" class="btn-secondary" onclick="goToPage('/')">
              Back
            </button>
          </div>
        </form>
      </div>

      <div class="home-link">
        <a href="/">← Back to Home</a>
      </div>
    </div>
  </div>

  <!-- Supabase Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const messageEl = document.getElementById('message');
  const tabButtons = document.querySelectorAll('.tab-btn');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  // =========================
  // TAB SWITCH (UNCHANGED)
  // =========================
  if (tabButtons.length) {
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        tabButtons.forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));

        btn.classList.add('active');
        const tabId = btn.getAttribute('data-tab');

        const tab = document.getElementById(tabId);
        if (tab) tab.classList.add('active');

        if (messageEl) messageEl.style.display = 'none';
      });
    });
  }

  // =========================
  // LOGIN (FIXED USER HANDLING)
  // =========================
  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail')?.value.trim();
      const password = document.getElementById('loginPassword')?.value;

      if (!email || !password) {
        showMessage(messageEl, 'Please fill in all fields', 'error');
        return;
      }

      setButtonLoading('loginBtn', true);

      try {
        const result = await signIn(email, password);

        // 🔥 FIX: support both response formats
        const user = result.data?.user || result.data?.session?.user;

        if (result.success && user) {
          localStorage.setItem('user_id', user.id);

          showMessage(messageEl, '✅ Login successful! Redirecting...', 'success');

          setTimeout(() => {
            window.location.href = '/order.html';
          }, 800);
        } else {
          throw new Error(result.error || 'Login failed');
        }

      } catch (err) {
        console.error(err);
        showMessage(messageEl, `❌ ${err.message}`, 'error');
      }

      setButtonLoading('loginBtn', false);
    });
  }

  // =========================
  // SIGNUP (FIXED EMOJI + USER HANDLING)
  // =========================
  if (signupForm) {
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('signupEmail')?.value.trim();
      const password = document.getElementById('signupPassword')?.value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm')?.value;

      if (!email || !password || !passwordConfirm) {
        showMessage(messageEl, 'Please fill in all fields', 'error');
        return;
      }

      if (password !== passwordConfirm) {
        showMessage(messageEl, 'Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage(messageEl, 'Password must be at least 6 characters', 'error');
        return;
      }

      setButtonLoading('signupBtn', true);

      try {
        const result = await signUp(email, password);

        if (!result.success) {
          throw new Error(result.error || 'Signup failed');
        }

        showMessage(messageEl, '✅ Account created! Logging in...', 'success');

        const loginResult = await signIn(email, password);

        // 🔥 FIX: support both formats
        const user = loginResult.data?.user || loginResult.data?.session?.user;

        if (loginResult.success && user) {
          localStorage.setItem('user_id', user.id);

          setTimeout(() => {
            window.location.href = '/order.html';
          }, 800);
        } else {
          showMessage(messageEl, '⚠️ Signup done. Please login manually.', 'error');
        }

      } catch (err) {
        console.error(err);
        showMessage(messageEl, `❌ ${err.message}`, 'error');
      }

      setButtonLoading('signupBtn', false);
    });
  }

  console.log('[AUTH PAGE FIXED — NO STRUCTURE CHANGE]');
});
</script>
</body>
</html>
